name: Reset and fetch articles

on:
  workflow_dispatch:

jobs:
  reset-and-fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clear all articles from Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          python - <<'SCRIPT'
          import json, os, sys
          import firebase_admin
          from firebase_admin import credentials, firestore

          sa = os.environ.get("FIREBASE_SERVICE_ACCOUNT")
          if not sa:
              print("FIREBASE_SERVICE_ACCOUNT not set"); sys.exit(1)

          cred = credentials.Certificate(json.loads(sa))
          firebase_admin.initialize_app(cred)
          db = firestore.client()

          docs = db.collection("articles").stream()
          deleted = 0
          for doc in docs:
              doc.reference.delete()
              deleted += 1

          print(f"Deleted {deleted} articles.")
          SCRIPT

      - name: Fetch news
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/fetch_news.py

      - name: Summarize articles
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python scripts/summarize_news.py
